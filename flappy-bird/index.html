<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #4ec0ca;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}
canvas {
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  cursor: pointer;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game dimensions
const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

// Game state
let bird, pipes, score, bestScore, gameState, frameCount, groundX;

const GRAVITY = 0.45;
const JUMP = -7.5;
const PIPE_SPEED = 2.5;
const PIPE_GAP = 150;
const PIPE_WIDTH = 60;
const PIPE_SPACING = 220;
const GROUND_H = 80;
const BIRD_SIZE = 20;

bestScore = parseInt(localStorage.getItem('flappyBest') || '0');

function init() {
  bird = { x: 80, y: H / 2, vy: 0, rotation: 0, flapFrame: 0 };
  pipes = [];
  score = 0;
  frameCount = 0;
  groundX = 0;
  gameState = 'ready'; // ready, playing, dead
}

function spawnPipe(x) {
  const minY = 80;
  const maxY = H - GROUND_H - PIPE_GAP - 80;
  const topH = minY + Math.random() * (maxY - minY);
  pipes.push({ x, topH, scored: false });
}

function jump() {
  if (gameState === 'ready') {
    gameState = 'playing';
    bird.vy = JUMP;
  } else if (gameState === 'playing') {
    bird.vy = JUMP;
    bird.flapFrame = 8;
  } else if (gameState === 'dead' && frameCount > 30) {
    init();
  }
}

// Input
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

function update() {
  frameCount++;

  if (gameState === 'ready') {
    bird.y = H / 2 + Math.sin(frameCount * 0.08) * 10;
    groundX = (groundX - 1) % 24;
    return;
  }

  if (gameState === 'dead') return;

  // Bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.min(bird.vy * 3, 80);
  if (bird.flapFrame > 0) bird.flapFrame--;

  // Ground scroll
  groundX = (groundX - PIPE_SPEED) % 24;

  // Spawn pipes
  if (pipes.length === 0 || pipes[pipes.length - 1].x < W - PIPE_SPACING) {
    spawnPipe(pipes.length === 0 ? W + 100 : pipes[pipes.length - 1].x + PIPE_SPACING);
  }

  // Update pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    // Score
    if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
      p.scored = true;
      score++;
    }

    // Remove off-screen
    if (p.x + PIPE_WIDTH < -10) pipes.splice(i, 1);
  }

  // Collision
  const bx = bird.x, by = bird.y, br = BIRD_SIZE * 0.45;

  // Ground / ceiling
  if (by + br > H - GROUND_H || by - br < 0) {
    die();
    return;
  }

  // Pipes
  for (const p of pipes) {
    if (bx + br > p.x && bx - br < p.x + PIPE_WIDTH) {
      if (by - br < p.topH || by + br > p.topH + PIPE_GAP) {
        die();
        return;
      }
    }
  }
}

function die() {
  gameState = 'dead';
  frameCount = 0;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('flappyBest', bestScore);
  }
}

// --- Drawing ---

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  grad.addColorStop(0, '#4ec0ca');
  grad.addColorStop(1, '#e8f5e9');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_H);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const offset = (frameCount * 0.3) % (W + 200);
  [[100, 80, 60], [280, 50, 45], [180, 130, 50]].forEach(([bx, by, s]) => {
    const cx = (bx - offset + W + 200) % (W + 200) - 100;
    ctx.beginPath();
    ctx.arc(cx, by, s * 0.5, 0, Math.PI * 2);
    ctx.arc(cx - s * 0.3, by + 5, s * 0.35, 0, Math.PI * 2);
    ctx.arc(cx + s * 0.35, by + 3, s * 0.4, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawPipe(p) {
  const capH = 26;
  const capExtra = 6;

  // Top pipe body
  const tGrad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
  tGrad.addColorStop(0, '#5cb85c');
  tGrad.addColorStop(0.3, '#73d673');
  tGrad.addColorStop(0.7, '#73d673');
  tGrad.addColorStop(1, '#3d8b3d');
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH);

  // Top cap
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x - capExtra, p.topH - capH, PIPE_WIDTH + capExtra * 2, capH);
  ctx.strokeStyle = '#2d6b2d';
  ctx.lineWidth = 2;
  ctx.strokeRect(p.x - capExtra, p.topH - capH, PIPE_WIDTH + capExtra * 2, capH);

  // Bottom pipe body
  const bTop = p.topH + PIPE_GAP;
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x, bTop, PIPE_WIDTH, H - GROUND_H - bTop);

  // Bottom cap
  ctx.fillRect(p.x - capExtra, bTop, PIPE_WIDTH + capExtra * 2, capH);
  ctx.strokeRect(p.x - capExtra, bTop, PIPE_WIDTH + capExtra * 2, capH);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate((bird.rotation * Math.PI) / 180);

  const wingOffset = bird.flapFrame > 0 ? -6 : Math.sin(frameCount * 0.15) * 3;

  // Body
  ctx.fillStyle = '#f5c542';
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_SIZE, BIRD_SIZE * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#c49a1a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Wing
  ctx.fillStyle = '#e8b730';
  ctx.beginPath();
  ctx.ellipse(-4, wingOffset, 10, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye (white)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -5, 6, 0, Math.PI * 2);
  ctx.fill();

  // Pupil
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(10, -5, 3, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#e8452e';
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.lineTo(24, 3);
  ctx.lineTo(14, 6);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawGround() {
  // Ground body
  ctx.fillStyle = '#d4a653';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

  // Ground top stripe
  ctx.fillStyle = '#5cb85c';
  ctx.fillRect(0, H - GROUND_H, W, 15);

  // Ground pattern
  ctx.fillStyle = '#c49640';
  for (let x = groundX; x < W + 24; x += 24) {
    ctx.fillRect(x, H - GROUND_H + 20, 12, 4);
    ctx.fillRect(x + 12, H - GROUND_H + 30, 12, 4);
  }
}

function drawScore() {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 4;
  ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeText(score, W / 2, 65);
  ctx.fillText(score, W / 2, 65);
}

function drawReady() {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';

  ctx.strokeText('Flappy Bird', W / 2, H / 2 - 80);
  ctx.fillText('Flappy Bird', W / 2, H / 2 - 80);

  ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.lineWidth = 2;
  ctx.strokeText('Tap, Click or Press Space', W / 2, H / 2 + 60);
  ctx.fillText('Tap, Click or Press Space', W / 2, H / 2 + 60);

  if (bestScore > 0) {
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#ffe082';
    ctx.strokeText('Best: ' + bestScore, W / 2, H / 2 + 90);
    ctx.fillText('Best: ' + bestScore, W / 2, H / 2 + 90);
  }
}

function drawGameOver() {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  const pw = 260, ph = 180;
  const px = (W - pw) / 2, py = (H - ph) / 2 - 20;
  ctx.fillStyle = '#dec076';
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 3;
  roundRect(px, py, pw, ph, 12);

  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = 'bold 32px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeText('Game Over', W / 2, py + 45);
  ctx.fillText('Game Over', W / 2, py + 45);

  ctx.font = '22px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#333';
  ctx.fillText('Score: ' + score, W / 2, py + 85);
  ctx.fillStyle = '#8b6914';
  ctx.fillText('Best: ' + bestScore, W / 2, py + 115);

  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#555';
  ctx.fillText('Tap to restart', W / 2, py + 155);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function draw() {
  drawSky();
  drawClouds();
  pipes.forEach(drawPipe);
  drawGround();
  drawBird();
  drawScore();

  if (gameState === 'ready') drawReady();
  if (gameState === 'dead') drawGameOver();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
