<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elemental Clash</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f1a;--card:#1a1a2e;--accent:#e94560;--accent2:#0f3460;
    --win:#00c853;--lose:#ff1744;--draw:#ffd600;--text:#eee;--muted:#888;
    --fire:#ff6d00;--water:#29b6f6;--lightning:#ffd600;
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
  h1{font-size:2.2rem;margin:28px 0 4px;letter-spacing:1px}
  .subtitle{color:var(--muted);margin-bottom:18px;font-size:.95rem}

  .mode-toggle{display:flex;gap:0;margin-bottom:18px;border-radius:30px;overflow:hidden;border:2px solid var(--accent);flex-wrap:wrap;justify-content:center}
  .mode-btn{padding:9px 18px;cursor:pointer;background:transparent;color:var(--text);border:none;font-size:.85rem;transition:all .25s;white-space:nowrap}
  .mode-btn.active{background:var(--accent);font-weight:600}

  .match-format{display:flex;gap:8px;align-items:center;margin-bottom:16px;font-size:.85rem;color:var(--muted);flex-wrap:wrap;justify-content:center}
  .format-btn{padding:5px 14px;border:2px solid #333;border-radius:16px;background:transparent;color:var(--text);cursor:pointer;font-size:.8rem;transition:all .2s}
  .format-btn.active{border-color:var(--accent);background:rgba(233,69,96,.15);color:var(--accent);font-weight:600}
  .match-status{font-size:.9rem;color:var(--accent);font-weight:600;min-height:24px;margin-bottom:8px;text-align:center}

  .arena{display:flex;align-items:center;gap:36px;margin-bottom:16px;position:relative}
  .player-side{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:140px}
  .player-label{font-size:.85rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
  .choice-display{width:120px;height:120px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:3.5rem;border:3px solid #333;transition:border-color .4s,transform .3s,box-shadow .4s;position:relative;user-select:none}
  .choice-display.winner{border-color:var(--win);box-shadow:0 0 25px rgba(0,200,83,.35);transform:scale(1.08)}
  .choice-display.loser{border-color:var(--lose);opacity:.7;transform:scale(.92)}
  .choice-display.draw-anim{border-color:var(--draw);box-shadow:0 0 20px rgba(255,214,0,.3)}
  .choice-display.locked{border-color:var(--accent);box-shadow:0 0 15px rgba(233,69,96,.3)}
  .vs{font-size:1.6rem;font-weight:700;color:var(--accent);letter-spacing:2px}

  .countdown{font-size:4rem;font-weight:900;color:var(--accent);min-height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
  @keyframes countPulse{0%{transform:scale(1.4);opacity:1}100%{transform:scale(.8);opacity:.5}}
  .countdown .pulse{animation:countPulse .7s ease}

  .result-text{font-size:1.5rem;font-weight:700;min-height:44px;transition:opacity .3s;text-align:center}
  .result-text.win{color:var(--win)}.result-text.lose{color:var(--lose)}.result-text.draw{color:var(--draw)}

  .choices{display:flex;gap:12px;margin:14px 0 10px;flex-wrap:wrap;justify-content:center}
  .choice-btn{width:78px;height:78px;border-radius:50%;border:3px solid #333;background:var(--card);font-size:2.2rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative}
  .choice-btn:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 6px 20px rgba(233,69,96,.25)}
  .choice-btn:active{transform:scale(.93)}
  .choice-btn.selected{border-color:var(--win);box-shadow:0 0 18px rgba(0,200,83,.3);transform:scale(1.05)}
  .choice-btn:disabled{opacity:.4;cursor:default;transform:none!important;box-shadow:none!important}
  .choice-btn .btn-label{position:absolute;bottom:-18px;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap}

  .local-panels{display:flex;gap:20px;margin:14px 0;width:100%;justify-content:center;flex-wrap:wrap}
  .local-panel{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 12px;border-radius:16px;background:var(--card);border:2px solid #333;min-width:200px;transition:border-color .3s}
  .local-panel.ready{border-color:var(--win)}
  .local-panel .panel-title{font-size:.8rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
  .local-panel .panel-status{font-size:.75rem;color:var(--accent);min-height:18px}
  .local-panel .choices{margin:6px 0 0;gap:8px}
  .local-panel .choice-btn{width:52px;height:52px;font-size:1.5rem}
  .local-panel .choice-btn .btn-label{font-size:.5rem;bottom:-15px}

  .online-lobby{display:flex;flex-direction:column;align-items:center;gap:12px;margin:10px 0;padding:20px;border-radius:16px;background:var(--card);width:100%;max-width:420px}
  .online-lobby h3{font-size:1rem;color:var(--text)}
  .lobby-row{display:flex;gap:10px;align-items:center;width:100%}
  .lobby-input{flex:1;padding:10px 14px;border-radius:12px;border:2px solid #333;background:var(--bg);color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
  .lobby-input:focus{border-color:var(--accent)}
  .lobby-btn{padding:10px 20px;border:none;border-radius:12px;font-size:.9rem;cursor:pointer;font-weight:600;transition:all .2s}
  .lobby-btn.primary{background:var(--accent);color:#fff}.lobby-btn.primary:hover{filter:brightness(1.15)}
  .lobby-btn.secondary{background:#333;color:var(--text)}.lobby-btn.secondary:hover{background:#444}
  .lobby-status{font-size:.85rem;color:var(--muted);text-align:center;min-height:20px}
  .room-code-display{font-size:1.4rem;font-weight:700;letter-spacing:4px;color:var(--accent);padding:8px 20px;background:var(--bg);border-radius:10px;cursor:pointer;transition:all .2s;border:2px dashed #333}
  .room-code-display:hover{border-color:var(--accent)}
  .copied-toast{font-size:.75rem;color:var(--win)}
  .name-input{width:180px;padding:8px 14px;border-radius:10px;border:2px solid #333;background:var(--bg);color:var(--text);font-size:.9rem;outline:none;text-align:center;transition:border-color .2s}
  .name-input:focus{border-color:var(--accent)}

  .scoreboard{display:flex;gap:30px;margin:14px 0 10px;font-size:1rem}
  .score-item{display:flex;flex-direction:column;align-items:center;gap:2px}
  .score-item .num{font-size:1.8rem;font-weight:700}
  .score-item .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
  .score-item.w .num{color:var(--win)}.score-item.l .num{color:var(--lose)}.score-item.d .num{color:var(--draw)}

  .sim-controls{display:flex;gap:12px;align-items:center;margin:12px 0;flex-wrap:wrap;justify-content:center}
  .sim-btn{padding:10px 26px;border:none;border-radius:24px;font-size:.95rem;cursor:pointer;font-weight:600;transition:all .2s}
  .sim-btn.start{background:var(--win);color:#111}.sim-btn.start:hover{filter:brightness(1.15)}
  .sim-btn.stop{background:var(--lose);color:#fff}.sim-btn.stop:hover{filter:brightness(1.15)}
  .sim-btn.reset{background:#444;color:#fff}.sim-btn.reset:hover{background:#555}
  .speed-control{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.85rem}
  .speed-control input{width:100px;accent-color:var(--accent)}

  .history-section{margin-top:16px;width:100%;max-width:580px}
  .history-title{font-size:.85rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .history-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;padding-right:4px}
  .history-list::-webkit-scrollbar{width:4px}.history-list::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .history-item{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-radius:8px;background:var(--card);font-size:.85rem;animation:slideIn .3s ease}
  .history-item .round-num{color:var(--muted);min-width:36px}
  .history-item .matchup{flex:1;text-align:center}
  .history-item .tag{padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:600;min-width:52px;text-align:center}
  .tag.win-tag{background:rgba(0,200,83,.15);color:var(--win)}
  .tag.lose-tag{background:rgba(255,23,68,.15);color:var(--lose)}
  .tag.draw-tag{background:rgba(255,214,0,.15);color:var(--draw)}

  .stats-bar{width:100%;max-width:580px;height:8px;border-radius:4px;overflow:hidden;display:flex;margin:6px 0 4px;background:#222}
  .stats-bar .seg{height:100%;transition:width .5s ease}
  .seg.w-seg{background:var(--win)}.seg.l-seg{background:var(--lose)}.seg.d-seg{background:var(--draw)}
  .stats-labels{display:flex;justify-content:space-between;width:100%;max-width:580px;font-size:.7rem;color:var(--muted);margin-bottom:10px}

  .matchup-toggle{margin-top:10px;font-size:.8rem;color:var(--accent);cursor:pointer;background:none;border:none;text-decoration:underline;padding:4px}
  .matchup-chart{margin-top:10px;width:100%;max-width:580px;overflow-x:auto}
  .matchup-chart table{border-collapse:collapse;width:100%;font-size:.72rem;text-align:center}
  .matchup-chart th,.matchup-chart td{padding:6px 4px;border:1px solid #222}
  .matchup-chart th{background:var(--card);color:var(--muted);font-weight:600}
  .matchup-chart .cell-win{background:rgba(0,200,83,.12);color:var(--win)}
  .matchup-chart .cell-lose{background:rgba(255,23,68,.1);color:var(--lose)}
  .matchup-chart .cell-draw{background:rgba(255,214,0,.08);color:var(--draw)}
  .matchup-chart .cell-self{background:#111;color:#333}

  @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg) scale(1.1)}50%{transform:rotate(15deg) scale(1.1)}75%{transform:rotate(-10deg)}}
  .shaking{animation:shake .4s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .pop{animation:pop .35s ease}

  .container{display:flex;flex-direction:column;align-items:center;padding:0 20px 40px;width:100%;max-width:640px}
  .hidden{display:none!important}

  .match-banner{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:100;backdrop-filter:blur(6px)}
  .match-banner-inner{text-align:center;padding:40px 60px;border-radius:24px;background:var(--card);border:3px solid var(--win);animation:pop .5s ease}
  .match-banner h2{font-size:2rem;color:var(--win);margin-bottom:10px}
  .match-banner p{color:var(--muted);margin-bottom:20px}
  .match-banner button{padding:12px 32px;border:none;border-radius:20px;background:var(--accent);color:#fff;font-size:1rem;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<h1>Elemental Clash</h1>
<p class="subtitle">6 types. Play, Simulate, or Challenge a Friend.</p>

<div class="container">
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="cpu">vs CPU</button>
    <button class="mode-btn" data-mode="local">1v1 Local</button>
    <button class="mode-btn" data-mode="online">1v1 Online</button>
    <button class="mode-btn" data-mode="sim">Simulate</button>
  </div>

  <div class="match-format" id="matchFormat">
    <span>Match:</span>
    <button class="format-btn" data-bo="1">FT1</button>
    <button class="format-btn" data-bo="3">FT3</button>
    <button class="format-btn active" data-bo="5">FT5</button>
    <button class="format-btn" data-bo="0">Endless</button>
  </div>
  <div class="match-status" id="matchStatus"></div>

  <div class="countdown hidden" id="countdown"></div>

  <div class="arena">
    <div class="player-side">
      <span class="player-label" id="leftLabel">You</span>
      <div class="choice-display" id="leftChoice">?</div>
    </div>
    <span class="vs">VS</span>
    <div class="player-side">
      <span class="player-label" id="rightLabel">CPU</span>
      <div class="choice-display" id="rightChoice">?</div>
    </div>
  </div>

  <div class="result-text" id="resultText">&nbsp;</div>

  <!-- CPU mode buttons -->
  <div class="choices" id="cpuControls">
    <button class="choice-btn" data-choice="fire" title="Fire">&#x1F525;<span class="btn-label">Fire</span></button>
    <button class="choice-btn" data-choice="water" title="Water">&#x1F4A7;<span class="btn-label">Water</span></button>
    <button class="choice-btn" data-choice="lightning" title="Lightning">&#x26A1;<span class="btn-label">Lightning</span></button>
    <button class="choice-btn" data-choice="grass" title="Grass">&#x1F33F;<span class="btn-label">Grass</span></button>
    <button class="choice-btn" data-choice="metal" title="Metal">&#x1F6E1;&#xFE0F;<span class="btn-label">Metal</span></button>
    <button class="choice-btn" data-choice="rock" title="Rock">&#x1FAA8;<span class="btn-label">Rock</span></button>
  </div>

  <!-- Local 1v1 panels -->
  <div class="local-panels hidden" id="localPanels">
    <div class="local-panel" id="p1Panel">
      <span class="panel-title">Player 1</span>
      <span class="panel-status" id="p1Status">Pick your move</span>
      <div class="choices">
        <button class="choice-btn" data-player="1" data-choice="fire">&#x1F525;<span class="btn-label">Fire</span></button>
        <button class="choice-btn" data-player="1" data-choice="water">&#x1F4A7;<span class="btn-label">Water</span></button>
        <button class="choice-btn" data-player="1" data-choice="lightning">&#x26A1;<span class="btn-label">Zap</span></button>
        <button class="choice-btn" data-player="1" data-choice="grass">&#x1F33F;<span class="btn-label">Grass</span></button>
        <button class="choice-btn" data-player="1" data-choice="metal">&#x1F6E1;&#xFE0F;<span class="btn-label">Metal</span></button>
        <button class="choice-btn" data-player="1" data-choice="rock">&#x1FAA8;<span class="btn-label">Rock</span></button>
      </div>
    </div>
    <div class="local-panel" id="p2Panel">
      <span class="panel-title">Player 2</span>
      <span class="panel-status" id="p2Status">Pick your move</span>
      <div class="choices">
        <button class="choice-btn" data-player="2" data-choice="fire">&#x1F525;<span class="btn-label">Fire</span></button>
        <button class="choice-btn" data-player="2" data-choice="water">&#x1F4A7;<span class="btn-label">Water</span></button>
        <button class="choice-btn" data-player="2" data-choice="lightning">&#x26A1;<span class="btn-label">Zap</span></button>
        <button class="choice-btn" data-player="2" data-choice="grass">&#x1F33F;<span class="btn-label">Grass</span></button>
        <button class="choice-btn" data-player="2" data-choice="metal">&#x1F6E1;&#xFE0F;<span class="btn-label">Metal</span></button>
        <button class="choice-btn" data-player="2" data-choice="rock">&#x1FAA8;<span class="btn-label">Rock</span></button>
      </div>
    </div>
  </div>

  <!-- Online lobby -->
  <div class="online-lobby hidden" id="onlineLobby">
    <h3>Online 1v1</h3>
    <div class="lobby-row" style="justify-content:center">
      <input class="name-input" id="myNameInput" placeholder="Your name" maxlength="16" value="">
    </div>
    <div id="lobbyCreate">
      <button class="lobby-btn primary" id="createRoom">Create Room</button>
      <span style="color:var(--muted);font-size:.85rem">or</span>
      <div class="lobby-row">
        <input class="lobby-input" id="joinInput" placeholder="Enter room code" maxlength="6" style="text-transform:uppercase;letter-spacing:2px;text-align:center">
        <button class="lobby-btn secondary" id="joinRoom">Join</button>
      </div>
    </div>
    <div id="lobbyWaiting" class="hidden" style="text-align:center">
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:8px">Share this room code:</p>
      <div class="room-code-display" id="roomCodeDisplay" title="Click to copy"></div>
      <span class="copied-toast hidden" id="copiedToast">Copied!</span>
      <p class="lobby-status" id="lobbyStatus">Waiting for opponent...</p>
    </div>
    <div id="lobbyConnected" class="hidden" style="text-align:center">
      <p style="color:var(--win);font-weight:600" id="connectedMsg">Opponent connected!</p>
    </div>
  </div>

  <!-- Online pick buttons -->
  <div class="choices hidden" id="onlineControls">
    <button class="choice-btn" data-choice="fire" title="Fire">&#x1F525;<span class="btn-label">Fire</span></button>
    <button class="choice-btn" data-choice="water" title="Water">&#x1F4A7;<span class="btn-label">Water</span></button>
    <button class="choice-btn" data-choice="lightning" title="Lightning">&#x26A1;<span class="btn-label">Lightning</span></button>
    <button class="choice-btn" data-choice="grass" title="Grass">&#x1F33F;<span class="btn-label">Grass</span></button>
    <button class="choice-btn" data-choice="metal" title="Metal">&#x1F6E1;&#xFE0F;<span class="btn-label">Metal</span></button>
    <button class="choice-btn" data-choice="rock" title="Rock">&#x1FAA8;<span class="btn-label">Rock</span></button>
  </div>

  <!-- Sim controls -->
  <div class="sim-controls hidden" id="simControls">
    <button class="sim-btn start" id="simStart">Start</button>
    <button class="sim-btn stop hidden" id="simStop">Pause</button>
    <button class="sim-btn reset" id="simReset">Reset</button>
    <div class="speed-control">
      <label for="speedSlider">Speed</label>
      <input type="range" id="speedSlider" min="50" max="1000" value="400" step="50">
    </div>
  </div>

  <div class="scoreboard">
    <div class="score-item w"><span class="num" id="wins">0</span><span class="lbl" id="winsLabel">Wins</span></div>
    <div class="score-item d"><span class="num" id="draws">0</span><span class="lbl">Draws</span></div>
    <div class="score-item l"><span class="num" id="losses">0</span><span class="lbl" id="lossesLabel">Losses</span></div>
    <div class="score-item"><span class="num" id="total">0</span><span class="lbl">Rounds</span></div>
  </div>

  <div class="stats-bar"><div class="seg w-seg" id="wSeg"></div><div class="seg l-seg" id="lSeg"></div><div class="seg d-seg" id="dSeg"></div></div>
  <div class="stats-labels"><span id="wPct">0%</span><span id="dPct">0%</span><span id="lPct">0%</span></div>

  <button class="matchup-toggle" id="chartToggle">Show Matchup Chart</button>
  <div class="matchup-chart hidden" id="matchupChart"></div>

  <div class="history-section">
    <div class="history-title"><span>Round History</span><button class="sim-btn reset" style="padding:4px 12px;font-size:.75rem" id="clearHistory">Clear</button></div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="match-banner hidden" id="matchBanner">
  <div class="match-banner-inner">
    <h2 id="bannerTitle">Match Over!</h2>
    <p id="bannerSub"></p>
    <button id="bannerBtn">Play Again</button>
  </div>
</div>

<script>
// ─── Game Data ───
const EMOJI = {
  fire: '\u{1F525}', water: '\u{1F4A7}', lightning: '\u26A1',
  grass: '\u{1F33F}', metal: '\u{1F6E1}\uFE0F', rock: '\u{1FAA8}'
};
const CHOICES = ['fire','water','lightning','grass','metal','rock'];
const NAMES = { fire:'Fire', water:'Water', lightning:'Lightning', grass:'Grass', metal:'Metal', rock:'Rock' };

const BEATS = {
  fire:      ['lightning','grass','metal'],
  water:     ['fire','metal','rock'],
  lightning: ['water','grass','metal'],
  grass:     ['water','rock'],
  metal:     ['grass','rock'],
  rock:      ['fire','lightning']
};

const WHY = {
  'fire>lightning':'absorbs','fire>grass':'burns','fire>metal':'melts',
  'water>fire':'extinguishes','water>metal':'rusts','water>rock':'erodes',
  'lightning>water':'electrifies','lightning>grass':'scorches','lightning>metal':'conducts through',
  'grass>water':'absorbs','grass>rock':'overgrows',
  'metal>grass':'cuts','metal>rock':'smashes',
  'rock>fire':'smothers','rock>lightning':'grounds'
};

// ─── State ───
let mode = 'cpu';
let bestOf = 5;
let score = { w:0, l:0, d:0, total:0 };
let matchWins = { left:0, right:0 };
let roundNum = 0;
let simInterval = null;
let localPicks = { 1:null, 2:null };
let localLocked = false;

// Online state
let onlinePick = null;
let opponentPick = null;
let onlineConnected = false;
let onlineResolving = false;  // guard flag
let peer = null;
let conn = null;
let isHost = false;
let myName = 'Player 1';
let opponentName = 'Player 2';

// ─── DOM ───
const $ = id => document.getElementById(id);
const $left = $('leftChoice'), $right = $('rightChoice');
const $result = $('resultText');
const $leftLabel = $('leftLabel'), $rightLabel = $('rightLabel');
const $countdown = $('countdown');
const $matchStatus = $('matchStatus');

function randChoice() { return CHOICES[Math.floor(Math.random() * CHOICES.length)]; }

function resolve(a, b) {
  if (a === b) return 'draw';
  return BEATS[a].includes(b) ? 'win' : 'lose';
}

function getFlavorText(winner, loser) {
  return WHY[winner + '>' + loser] || 'beats';
}

function getMyName() {
  return $('myNameInput').value.trim() || 'Player';
}

// ─── Matchup Chart ───
function buildMatchupChart() {
  let html = '<table><tr><th></th>';
  CHOICES.forEach(c => html += `<th>${EMOJI[c]}</th>`);
  html += '</tr>';
  CHOICES.forEach(a => {
    html += `<tr><th>${EMOJI[a]} ${NAMES[a]}</th>`;
    CHOICES.forEach(b => {
      if (a === b) html += '<td class="cell-self">-</td>';
      else if (BEATS[a].includes(b)) html += `<td class="cell-win">W</td>`;
      else html += `<td class="cell-lose">L</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  $('matchupChart').innerHTML = html;
}
buildMatchupChart();
$('chartToggle').addEventListener('click', () => {
  const chart = $('matchupChart');
  const showing = !chart.classList.contains('hidden');
  chart.classList.toggle('hidden');
  $('chartToggle').textContent = showing ? 'Show Matchup Chart' : 'Hide Matchup Chart';
});

// ─── Mode Switching ───
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    switchMode(btn.dataset.mode);
  });
});

function switchMode(newMode) {
  stopSim();
  cleanupOnline();
  mode = newMode;
  resetMatch();
  ['cpuControls','localPanels','onlineLobby','onlineControls','simControls'].forEach(id => $(id).classList.add('hidden'));
  $countdown.classList.add('hidden');

  if (mode === 'cpu') {
    $leftLabel.textContent = 'You'; $rightLabel.textContent = 'CPU';
    $('winsLabel').textContent = 'Wins'; $('lossesLabel').textContent = 'Losses';
    $('cpuControls').classList.remove('hidden');
  } else if (mode === 'local') {
    $leftLabel.textContent = 'P1'; $rightLabel.textContent = 'P2';
    $('winsLabel').textContent = 'P1'; $('lossesLabel').textContent = 'P2';
    $('localPanels').classList.remove('hidden');
    resetLocalPicks();
  } else if (mode === 'online') {
    $leftLabel.textContent = 'You'; $rightLabel.textContent = 'Opponent';
    $('winsLabel').textContent = 'You'; $('lossesLabel').textContent = 'Them';
    $('onlineLobby').classList.remove('hidden');
    $('lobbyCreate').classList.remove('hidden');
    $('lobbyWaiting').classList.add('hidden');
    $('lobbyConnected').classList.add('hidden');
  } else if (mode === 'sim') {
    $leftLabel.textContent = 'Bot 1'; $rightLabel.textContent = 'Bot 2';
    $('winsLabel').textContent = 'B1'; $('lossesLabel').textContent = 'B2';
    $('simControls').classList.remove('hidden');
  }
}

// ─── Match Format ───
document.querySelectorAll('.format-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bestOf = parseInt(btn.dataset.bo);
    resetMatch();
    if (mode === 'local') resetLocalPicks();
  });
});

function updateMatchStatus() {
  if (bestOf === 0) { $matchStatus.textContent = ''; return; }
  const need = bestOf;
  $matchStatus.textContent = `FT${bestOf}  \u2014  ${matchWins.left} - ${matchWins.right}  (first to ${need})`;
}

function checkMatchWinner() {
  if (bestOf === 0) return false;
  const need = bestOf;
  if (matchWins.left >= need || matchWins.right >= need) {
    const leftWon = matchWins.left >= need;
    let winner = '';
    if (mode === 'cpu') winner = leftWon ? 'You Win the Match!' : 'CPU Wins the Match!';
    else if (mode === 'local') winner = leftWon ? 'Player 1 Wins!' : 'Player 2 Wins!';
    else if (mode === 'online') winner = leftWon ? myName + ' Wins the Match!' : opponentName + ' Wins the Match!';
    else if (mode === 'sim') winner = leftWon ? 'Bot 1 Wins!' : 'Bot 2 Wins!';
    showMatchBanner(winner, `${matchWins.left} - ${matchWins.right}`);
    return true;
  }
  return false;
}

function showMatchBanner(title, sub) {
  $('bannerTitle').textContent = title;
  $('bannerSub').textContent = sub;
  $('matchBanner').classList.remove('hidden');
  stopSim();
}

$('bannerBtn').addEventListener('click', () => {
  $('matchBanner').classList.add('hidden');
  resetMatch();
  if (mode === 'local') resetLocalPicks();
  if (mode === 'online' && conn) { conn.send({ type:'rematch' }); startOnlineRound(); }
});

// ─── Shared Play Logic ───
function animateChoice(el, emoji) {
  el.classList.remove('pop','winner','loser','draw-anim','locked');
  el.textContent = '';
  el.classList.add('shaking');
  setTimeout(() => { el.classList.remove('shaking'); el.textContent = emoji; el.classList.add('pop'); }, 350);
}

function showResultText(outcome, a, b, leftName, rightName) {
  $result.classList.remove('win','lose','draw');
  if (outcome === 'win') {
    $result.textContent = `${EMOJI[a]} ${getFlavorText(a,b)} ${EMOJI[b]} \u2014 ${leftName} Wins!`;
    $result.classList.add('win');
  } else if (outcome === 'lose') {
    $result.textContent = `${EMOJI[b]} ${getFlavorText(b,a)} ${EMOJI[a]} \u2014 ${rightName} Wins!`;
    $result.classList.add('lose');
  } else {
    $result.textContent = `${EMOJI[a]} vs ${EMOJI[b]} \u2014 Draw!`;
    $result.classList.add('draw');
  }
}

function applyOutcomeStyle(outcome) {
  $left.classList.remove('winner','loser','draw-anim');
  $right.classList.remove('winner','loser','draw-anim');
  if (outcome === 'win') { $left.classList.add('winner'); $right.classList.add('loser'); }
  else if (outcome === 'lose') { $left.classList.add('loser'); $right.classList.add('winner'); }
  else { $left.classList.add('draw-anim'); $right.classList.add('draw-anim'); }
}

function updateScore(outcome) {
  if (outcome === 'win') { score.w++; matchWins.left++; }
  else if (outcome === 'lose') { score.l++; matchWins.right++; }
  else score.d++;
  score.total++;
  $('wins').textContent = score.w;
  $('losses').textContent = score.l;
  $('draws').textContent = score.d;
  $('total').textContent = score.total;
  const t = score.total || 1;
  $('wSeg').style.width = (score.w/t*100)+'%';
  $('lSeg').style.width = (score.l/t*100)+'%';
  $('dSeg').style.width = (score.d/t*100)+'%';
  $('wPct').textContent = (score.w/t*100).toFixed(1)+'% W';
  $('dPct').textContent = (score.d/t*100).toFixed(1)+'% D';
  $('lPct').textContent = (score.l/t*100).toFixed(1)+'% L';
  updateMatchStatus();
}

function addHistory(a, b, outcome, leftName, rightName) {
  roundNum++;
  let label, tag;
  if (mode === 'online') {
    label = outcome === 'win' ? myName : outcome === 'lose' ? opponentName : 'DRAW';
    tag = outcome === 'win' ? 'win-tag' : outcome === 'lose' ? 'lose-tag' : 'draw-tag';
  } else if (mode === 'cpu') {
    label = outcome === 'win' ? 'WIN' : outcome === 'lose' ? 'LOSE' : 'DRAW';
    tag = outcome === 'win' ? 'win-tag' : outcome === 'lose' ? 'lose-tag' : 'draw-tag';
  } else if (mode === 'local') {
    label = outcome === 'win' ? 'P1' : outcome === 'lose' ? 'P2' : 'DRAW';
    tag = outcome === 'win' ? 'win-tag' : outcome === 'lose' ? 'lose-tag' : 'draw-tag';
  } else {
    label = outcome === 'win' ? 'B1' : outcome === 'lose' ? 'B2' : 'DRAW';
    tag = outcome === 'win' ? 'win-tag' : outcome === 'lose' ? 'lose-tag' : 'draw-tag';
  }
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `<span class="round-num">#${roundNum}</span><span class="matchup">${EMOJI[a]} vs ${EMOJI[b]}</span><span class="tag ${tag}">${label}</span>`;
  $('historyList').prepend(item);
  if ($('historyList').children.length > 50) $('historyList').removeChild($('historyList').lastChild);
}

function resetMatch() {
  matchWins = { left:0, right:0 };
  score = { w:0, l:0, d:0, total:0 };
  roundNum = 0;
  onlineResolving = false;
  $('wins').textContent = $('losses').textContent = $('draws').textContent = $('total').textContent = '0';
  $left.textContent = $right.textContent = '?';
  $left.classList.remove('winner','loser','draw-anim','locked');
  $right.classList.remove('winner','loser','draw-anim','locked');
  $result.textContent = '\u00A0';
  $result.classList.remove('win','lose','draw');
  $('historyList').innerHTML = '';
  $('wSeg').style.width = $('lSeg').style.width = $('dSeg').style.width = '0';
  $('wPct').textContent = $('lPct').textContent = $('dPct').textContent = '0%';
  updateMatchStatus();
}

function runCountdown(cb) {
  $countdown.classList.remove('hidden');
  let count = 3;
  $countdown.innerHTML = `<span class="pulse">${count}</span>`;
  const iv = setInterval(() => {
    count--;
    if (count > 0) {
      $countdown.innerHTML = `<span class="pulse">${count}</span>`;
    } else {
      clearInterval(iv);
      $countdown.innerHTML = `<span class="pulse">GO!</span>`;
      setTimeout(() => { $countdown.classList.add('hidden'); cb(); }, 400);
    }
  }, 700);
}

// ─── CPU Mode ───
$('cpuControls').addEventListener('click', e => {
  const btn = e.target.closest('.choice-btn');
  if (!btn || mode !== 'cpu') return;
  const a = btn.dataset.choice, b = randChoice();
  const outcome = resolve(a, b);
  animateChoice($left, EMOJI[a]);
  animateChoice($right, EMOJI[b]);
  setTimeout(() => {
    showResultText(outcome, a, b, 'You', 'CPU');
    applyOutcomeStyle(outcome);
    updateScore(outcome);
    addHistory(a, b, outcome);
    checkMatchWinner();
  }, 380);
});

// ─── Local 1v1 ───
$('localPanels').addEventListener('click', e => {
  const btn = e.target.closest('.choice-btn');
  if (!btn || mode !== 'local' || localLocked) return;
  const p = btn.dataset.player;
  localPicks[p] = btn.dataset.choice;
  btn.closest('.local-panel').querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  btn.closest('.local-panel').classList.add('ready');
  $(p === '1' ? 'p1Status' : 'p2Status').textContent = 'Locked in!';

  if (localPicks[1] && localPicks[2]) {
    localLocked = true;
    runCountdown(() => {
      const a = localPicks[1], b = localPicks[2];
      const outcome = resolve(a, b);
      animateChoice($left, EMOJI[a]);
      animateChoice($right, EMOJI[b]);
      setTimeout(() => {
        showResultText(outcome, a, b, 'P1', 'P2');
        applyOutcomeStyle(outcome);
        updateScore(outcome);
        addHistory(a, b, outcome);
        if (!checkMatchWinner()) setTimeout(resetLocalPicks, 1800);
      }, 400);
    });
  }
});

function resetLocalPicks() {
  localPicks = { 1:null, 2:null };
  localLocked = false;
  document.querySelectorAll('#localPanels .choice-btn').forEach(b => { b.classList.remove('selected'); b.disabled = false; });
  document.querySelectorAll('.local-panel').forEach(p => p.classList.remove('ready'));
  $('p1Status').textContent = 'Pick your move';
  $('p2Status').textContent = 'Pick your move';
  $left.textContent = '?'; $right.textContent = '?';
  $left.classList.remove('winner','loser','draw-anim');
  $right.classList.remove('winner','loser','draw-anim');
}

// ─── Online 1v1 (PeerJS) — HOST-AUTHORITATIVE ───
function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

$('createRoom').addEventListener('click', () => {
  const code = genRoomCode();
  isHost = true;
  myName = getMyName() || 'Player 1';
  initPeer('rps6-' + code, () => {
    $('lobbyCreate').classList.add('hidden');
    $('lobbyWaiting').classList.remove('hidden');
    $('roomCodeDisplay').textContent = code;
    $('lobbyStatus').textContent = 'Waiting for opponent...';
  });
});

$('roomCodeDisplay').addEventListener('click', () => {
  const code = $('roomCodeDisplay').textContent;
  navigator.clipboard.writeText(code).then(() => {
    $('copiedToast').classList.remove('hidden');
    setTimeout(() => $('copiedToast').classList.add('hidden'), 1500);
  });
});

$('joinRoom').addEventListener('click', () => {
  const code = $('joinInput').value.trim().toUpperCase();
  if (code.length < 4) return;
  isHost = false;
  myName = getMyName() || 'Player 2';
  initPeer(null, () => {
    $('lobbyStatus').textContent = 'Connecting...';
    $('lobbyCreate').classList.add('hidden');
    $('lobbyWaiting').classList.remove('hidden');
    $('roomCodeDisplay').textContent = code;
    conn = peer.connect('rps6-' + code, { reliable: true });
    setupConn(conn);
  });
});

function initPeer(id, cb) {
  cleanupOnline();
  const opts = { debug: 0 };
  peer = id ? new Peer(id, opts) : new Peer(opts);
  peer.on('open', () => {
    cb();
    if (isHost) peer.on('connection', c => { conn = c; setupConn(c); });
  });
  peer.on('error', err => {
    if (err.type === 'unavailable-id') {
      $('lobbyStatus').textContent = 'Room code taken, try again.';
      $('lobbyCreate').classList.remove('hidden');
      $('lobbyWaiting').classList.add('hidden');
    } else if (err.type === 'peer-unavailable') {
      $('lobbyStatus').textContent = 'Room not found. Check the code.';
    } else {
      $('lobbyStatus').textContent = 'Connection error: ' + err.type;
    }
  });
}

function setupConn(c) {
  c.on('open', () => {
    onlineConnected = true;
    // Exchange names
    conn.send({ type:'name', name: myName });
    $('lobbyWaiting').classList.add('hidden');
    $('lobbyConnected').classList.remove('hidden');
    $('onlineControls').classList.remove('hidden');
    resetMatch();
    startOnlineRound();
  });
  c.on('data', handleOnlineData);
  c.on('close', () => {
    onlineConnected = false;
    $result.textContent = opponentName + ' disconnected';
    $result.classList.remove('win','lose','draw');
    $('onlineControls').classList.add('hidden');
  });
}

function startOnlineRound() {
  onlinePick = null;
  opponentPick = null;
  onlineResolving = false;
  $('onlineControls').querySelectorAll('.choice-btn').forEach(b => { b.classList.remove('selected'); b.disabled = false; });
  $left.textContent = '?'; $right.textContent = '?';
  $left.classList.remove('winner','loser','draw-anim','locked');
  $right.classList.remove('winner','loser','draw-anim','locked');
  $result.textContent = 'Pick your move!';
  $result.classList.remove('win','lose','draw');
}

$('onlineControls').addEventListener('click', e => {
  const btn = e.target.closest('.choice-btn');
  if (!btn || mode !== 'online' || !onlineConnected || onlinePick || onlineResolving) return;
  onlinePick = btn.dataset.choice;
  $('onlineControls').querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  $('onlineControls').querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  $left.textContent = '\u{1F512}';
  $left.classList.add('locked');
  $result.textContent = 'Waiting for ' + opponentName + '...';
  $result.classList.remove('win','lose','draw');
  conn.send({ type:'pick', choice: onlinePick });
  // If host and both picks in, host resolves
  if (isHost && opponentPick) hostResolve();
});

function handleOnlineData(data) {
  if (data.type === 'name') {
    opponentName = data.name || 'Opponent';
    $rightLabel.textContent = opponentName;
    $leftLabel.textContent = myName;
    $('winsLabel').textContent = myName;
    $('lossesLabel').textContent = opponentName;
    $('connectedMsg').textContent = opponentName + ' connected!';
  }

  if (data.type === 'pick') {
    opponentPick = data.choice;
    $right.textContent = '\u{1F512}';
    $right.classList.add('locked');
    if (onlinePick) {
      $result.textContent = 'Both locked in!';
    }
    // If host and both picks in, host resolves
    if (isHost && onlinePick) hostResolve();
  }

  // Joiner receives authoritative result from host
  if (data.type === 'result') {
    onlineResolving = true;
    // data contains: myPick (host's pick), opPick (joiner's pick), hostOutcome
    // For the joiner: "my pick" is data.opPick, "opponent pick" is data.myPick
    // And the outcome is OPPOSITE of hostOutcome
    const joinerMyPick = data.opPick;
    const joinerOpPick = data.myPick;
    const joinerOutcome = data.hostOutcome === 'win' ? 'lose' : data.hostOutcome === 'lose' ? 'win' : 'draw';
    displayOnlineResult(joinerMyPick, joinerOpPick, joinerOutcome);
  }

  if (data.type === 'rematch') { resetMatch(); startOnlineRound(); }
}

// HOST resolves the round authoritatively and sends result to joiner
function hostResolve() {
  if (onlineResolving || !onlinePick || !opponentPick) return;
  onlineResolving = true;
  const hostOutcome = resolve(onlinePick, opponentPick);
  // Send authoritative result to joiner
  conn.send({ type:'result', myPick: onlinePick, opPick: opponentPick, hostOutcome: hostOutcome });
  // Display locally for host
  displayOnlineResult(onlinePick, opponentPick, hostOutcome);
}

function displayOnlineResult(myPk, opPk, outcome) {
  runCountdown(() => {
    animateChoice($left, EMOJI[myPk]);
    animateChoice($right, EMOJI[opPk]);
    setTimeout(() => {
      showResultText(outcome, myPk, opPk, myName, opponentName);
      applyOutcomeStyle(outcome);
      updateScore(outcome);
      addHistory(myPk, opPk, outcome);
      if (!checkMatchWinner()) setTimeout(startOnlineRound, 2000);
    }, 400);
  });
}

function cleanupOnline() {
  onlineConnected = false;
  onlinePick = null;
  opponentPick = null;
  onlineResolving = false;
  if (conn) { try { conn.close(); } catch(e){} conn = null; }
  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
}

// ─── Sim Mode ───
function playSim() {
  const a = randChoice(), b = randChoice();
  const outcome = resolve(a, b);
  animateChoice($left, EMOJI[a]);
  animateChoice($right, EMOJI[b]);
  setTimeout(() => {
    showResultText(outcome, a, b, 'Bot 1', 'Bot 2');
    applyOutcomeStyle(outcome);
    updateScore(outcome);
    addHistory(a, b, outcome);
    if (checkMatchWinner()) stopSim();
  }, 380);
}

function startSim() {
  if (simInterval) return;
  const speed = 1050 - parseInt($('speedSlider').value);
  simInterval = setInterval(playSim, speed);
  $('simStart').classList.add('hidden');
  $('simStop').classList.remove('hidden');
}
function stopSim() {
  clearInterval(simInterval); simInterval = null;
  $('simStart').classList.remove('hidden');
  $('simStop').classList.add('hidden');
}

$('simStart').addEventListener('click', startSim);
$('simStop').addEventListener('click', stopSim);
$('speedSlider').addEventListener('input', () => { if (simInterval) { stopSim(); startSim(); } });
$('simReset').addEventListener('click', () => { stopSim(); resetMatch(); });
$('clearHistory').addEventListener('click', () => { $('historyList').innerHTML = ''; });

// ─── Init ───
updateMatchStatus();
</script>
</body>
</html>
